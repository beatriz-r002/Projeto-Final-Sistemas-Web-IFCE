<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Turmas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Turmas</h2>
    <a href="/turmas/novo" class="btn btn-success mb-3">+ Nova Turma</a>
    <a href="/" class="btn btn-secondary mb-3 ms-2">Voltar</a>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr><th>Código</th><th>Professor</th><th>Disciplina</th><th>Semestre</th><th>Alunos</th><th>Turno</th><th>Ações</th></tr>
        </thead>
        <tbody>
            <tr th:each="t : ${turmas}">
                <td th:text="${t.codTurma}"></td>
                <td th:text="${t.professor.nome}"></td>
                <td th:text="${t.disciplina.nome}"></td>
                <td th:text="${t.semestre}"></td>
                <td th:text="${t.numAlunos}"></td>
                <td th:text="${t.turno}"></td>
                <td>
                    <a th:href="@{/turmas/editar/{id}(id=${t.codTurma})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/turmas/excluir/{id}(id=${t.codTurma})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('Excluir turma?')">Excluir</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
