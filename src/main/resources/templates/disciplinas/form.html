<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Disciplina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4" style="max-width: 500px;">
    <h2 th:text="${disciplina.codDisciplina == null} ? 'Nova Disciplina' : 'Editar Disciplina'"></h2>
    <form th:action="@{/disciplinas/salvar}" th:object="${disciplina}" method="post">
        <input type="hidden" th:field="*{codDisciplina}">
        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" th:field="*{nome}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Carga Horária (horas)</label>
            <input type="number" class="form-control" th:field="*{cargaHoraria}" required min="1">
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="/disciplinas" class="btn btn-secondary ms-2">Cancelar</a>
    </form>
</div>
</body>
</html>
