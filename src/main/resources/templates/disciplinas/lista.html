<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Disciplinas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Disciplinas</h2>
    <a href="/disciplinas/novo" class="btn btn-success mb-3">+ Nova Disciplina</a>
    <a href="/" class="btn btn-secondary mb-3 ms-2">Voltar</a>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr><th>Código</th><th>Nome</th><th>Carga Horária</th><th>Ações</th></tr>
        </thead>
        <tbody>
            <tr th:each="d : ${disciplinas}">
                <td th:text="${d.codDisciplina}"></td>
                <td th:text="${d.nome}"></td>
                <td th:text="${d.cargaHoraria} + 'h'"></td>
                <td>
                    <a th:href="@{/disciplinas/editar/{id}(id=${d.codDisciplina})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/disciplinas/excluir/{id}(id=${d.codDisciplina})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('Excluir disciplina?')">Excluir</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
