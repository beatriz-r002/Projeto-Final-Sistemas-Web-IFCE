<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Professor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4" style="max-width: 500px;">
    <h2 th:text="${professor.matricula == null} ? 'Novo Professor' : 'Editar Professor'"></h2>
    <form th:action="@{/professores/salvar}" th:object="${professor}" method="post">
        <input type="hidden" th:field="*{matricula}">
        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" th:field="*{nome}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Telefone</label>
            <input type="text" class="form-control" th:field="*{telefone}">
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="/professores" class="btn btn-secondary ms-2">Cancelar</a>
    </form>
</div>
</body>
</html>
