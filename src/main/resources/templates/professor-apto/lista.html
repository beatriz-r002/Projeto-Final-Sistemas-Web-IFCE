<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Aptidões</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2>Disciplinas que Professores podem Ministrar</h2>
    <a href="/professor-apto/novo" class="btn btn-success mb-3">+ Registrar Aptidão</a>
    <a href="/" class="btn btn-secondary mb-3 ms-2">Voltar</a>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr><th>Professor</th><th>Disciplina</th><th>Ação</th></tr>
        </thead>
        <tbody>
            <tr th:each="r : ${registros}">
                <td th:text="${r.professor.nome}"></td>
                <td th:text="${r.disciplina.nome}"></td>
                <td>
                    <a th:href="@{/professor-apto/excluir(matriculaProfessor=${r.professor.matricula}, codDisciplina=${r.disciplina.codDisciplina})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Remover aptidão?')">Remover</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
