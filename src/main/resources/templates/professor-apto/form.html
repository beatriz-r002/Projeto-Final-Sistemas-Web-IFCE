<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Registrar Aptidão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4" style="max-width: 500px;">
    <h2>Registrar Aptidão</h2>
    <form action="/professor-apto/salvar" method="post">
        <div class="mb-3">
            <label class="form-label">Professor</label>
            <select name="matriculaProfessor" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="p : ${professores}" th:value="${p.matricula}" th:text="${p.nome}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Disciplina</label>
            <select name="codDisciplina" class="form-select" required>
                <option value="">Selecione...</option>
                <option th:each="d : ${disciplinas}" th:value="${d.codDisciplina}" th:text="${d.nome}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="/professor-apto" class="btn btn-secondary ms-2">Cancelar</a>
    </form>
</div>
</body>
</html>
